<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembersih & Pengecek Link otomatis</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1e3a8a; text-align: center; font-size: 24px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #4b5563; }
        textarea { width: 100%; height: 180px; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; }
        button { background-color: #2563eb; color: white; border: none; padding: 12px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; width: 100%; }
        button:disabled { background-color: #9ca3af; }
        .loading { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: #2563eb; }
        .stats-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; display: none; }
        .stat-card { background: #f3f4f6; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card.active-card { border-top: 4px solid #10b981; }
        .stat-card.error-card { border-top: 4px solid #ef4444; }
        .stat-num { font-size: 20px; font-weight: bold; }
        .results-section { display: none; margin-top: 25px; }
        .download-buttons { display: flex; gap: 15px; margin-top: 15px; }
        .btn-download { background-color: #10b981; text-decoration: none; text-align: center; color: white; padding: 10px; border-radius: 6px; font-weight: 600; flex: 1; display: none; cursor: pointer; }
        .btn-download.btn-err { background-color: #ef4444; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔗 Pembersih & Pengecek Link Otomatis</h1>
    <p class="subtitle">Tempelkan link atau unggah file .txt (Vercel Serverless Ready)</p>
    
    <div class="form-group">
        <label>Pilihan 1: Unggah File .txt</label>
        <input type="file" id="fileInput" accept=".txt">
    </div>
    
    <div class="form-group">
        <label>Pilihan 2: Tempelkan daftar link (satu per baris)</label>
        <textarea id="linksTextarea" placeholder="http://example.com/video1.mp4"></textarea>
    </div>
    
    <button id="processBtn" onclick="prosesLink()">Mulai Proses & Cek Link</button>
    
    <div id="loading" class="loading">⏳ Memeriksa link secara real-time, mohon tunggu...</div>
    
    <div id="statsBox" class="stats-box">
        <div class="stat-card">
            <div class="stat-num" id="statDuplikat">0</div>
            <div>Duplikat Dihapus</div>
        </div>
        <div class="stat-card active-card">
            <div class="stat-num" style="color:#10b981;" id="statAktif">0</div>
            <div>Link Aktif</div>
        </div>
        <div class="stat-card error-card">
            <div class="stat-num" style="color:#ef4444;" id="statError">0</div>
            <div>Link Error</div>
        </div>
    </div>
    
    <div id="resultsSection" class="results-section">
        <label>Unduh Hasil:</label>
        <div class="download-buttons">
            <a id="downloadAktif" class="btn-download">⬇️ Download Link Aktif (.txt)</a>
            <a id="downloadError" class="btn-download btn-err">⬇️ Download Laporan Error (.txt)</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('linksTextarea').value = e.target.result;
        };
        reader.readAsText(file);
    });

    async function prosesLink() {
        const content = document.getElementById('linksTextarea').value.trim();
        if (!content) {
            alert('Masukkan link dahulu!');
            return;
        }
        
        document.getElementById('processBtn').disabled = true;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('statsBox').style.display = 'none';
        document.getElementById('resultsSection').style.display = 'none';

        try {
            const response = await fetch('/check-links', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ links: content })
            });
            const data = await response.json();

            document.getElementById('statDuplikat').innerText = data.stat_duplikat;
            document.getElementById('statAktif').innerText = data.link_aktif.length;
            document.getElementById('statError').innerText = data.link_error.length;
            document.getElementById('statsBox').style.display = 'grid';

            if (data.link_aktif.length > 0) {
                const dl = document.getElementById('downloadAktif');
                dl.href = URL.createObjectURL(new Blob([data.link_aktif.join('\n')], { type: 'text/plain' }));
                dl.download = 'link_aktif_bersih.txt';
                dl.style.display = 'block';
            }
            
            if (data.link_error.length > 0) {
                const dl = document.getElementById('downloadError');
                dl.href = URL.createObjectURL(new Blob([data.link_error.join('\n')], { type: 'text/plain' }));
                dl.download = 'laporan_link_error.txt';
                dl.style.display = 'block';
            }
            
            document.getElementById('resultsSection').style.display = 'block';
        } catch (err) {
            alert('Terjadi kesalahan koneksi.');
        } finally {
            document.getElementById('processBtn').disabled = false;
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
